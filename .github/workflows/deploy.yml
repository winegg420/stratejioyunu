name: Deploy to Vercel

# Push sonrası build doğrulaması + geçerli VERCEL_TOKEN varsa prod deploy.
# Token geçersizse workflow uyarı verir; yerel: npm run deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@54.1.0

      - name: Validate Vercel token
        id: vercel-token
        run: |
          if vercel whoami --token="${{ secrets.VERCEL_TOKEN }}" >/dev/null 2>&1; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN geçersiz veya eksik. GitHub Secrets güncellenmeli. Yerel deploy: npm run deploy"
          fi

      - name: Deploy production
        if: steps.vercel-token.outputs.valid == 'true'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
