name: Deploy to Vercel

# master push → build + production deploy (stratejioyunu.vercel.app)
# VERCEL_TOKEN geçersizse iş KIRMIZI kalır — canlı site güncellenmez.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_5dtgTzHV3AHu8R8n5jmw9aMt
  VERCEL_PROJECT_ID: prj_IfcWXhoDC5QPTG7PwQppgA3utOEQ
  PRODUCTION_URL: https://stratejioyunu.vercel.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@54.1.0

      - name: Validate Vercel token
        id: vercel-token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::error::VERCEL_TOKEN secret tanımlı değil. docs/DEPLOY.md dosyasına bakın."
            exit 1
          fi
          if vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Vercel token geçerli."
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::error::VERCEL_TOKEN geçersiz veya süresi dolmuş. Yeni token: https://vercel.com/account/tokens → GitHub Secrets güncelle."
            exit 1
          fi

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Verify live production
        run: |
          echo "Canlı site doğrulanıyor: $PRODUCTION_URL"
          sleep 25
          HTML=$(curl -fsSL "$PRODUCTION_URL")
          JS_HASH=$(echo "$HTML" | grep -oE 'assets/index-[^"]+\.js' | head -1 | sed 's|assets/||;s|\.js||')
          if [ -z "$JS_HASH" ]; then
            echo "::error::index.html içinde JS bundle bulunamadı."
            exit 1
          fi
          echo "Aktif bundle: ${JS_HASH}.js"
          BODY=$(curl -fsSL "$PRODUCTION_URL/assets/${JS_HASH}.js")
          if ! echo "$BODY" | grep -q 'lang-switcher'; then
            echo "::error::Canlı bundle güncel görünmüyor (lang-switcher yok). Önbellek veya deploy hatası."
            exit 1
          fi
          if ! echo "$BODY" | grep -q 'registerAppUpdates'; then
            echo "::error::Canlı bundle otomatik güncelleme modülünü içermiyor. Deploy veya önbellek hatası."
            exit 1
          fi
          echo "Canlı production doğrulandı."
